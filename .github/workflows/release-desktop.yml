name: release-desktop

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  security-and-version-checks:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Verify OSS version consistency
        run: node scripts/version-check.js

      - name: Frontend dependency audit (prod)
        run: pnpm --dir frontend_app audit --prod

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust dependency audit
        run: |
          cd desktop/src-tauri
          cargo audit

  windows-portable:
    runs-on: windows-latest
    needs: security-and-version-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build portable Windows binary
        run: pnpm --dir frontend_app tauri:build
        env:
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Verify portable exe exists
        shell: pwsh
        run: |
          if (!(Test-Path "desktop/src-tauri/target/release/MindMapVault.exe")) {
            Write-Error "Missing desktop/src-tauri/target/release/MindMapVault.exe"
          }

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe
          path: desktop/src-tauri/target/release/MindMapVault.exe

      - name: Publish portable exe to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/MindMapVault.exe

      - name: Publish portable exe to "latest" release
        if: ${{ always() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: desktop/src-tauri/target/release/MindMapVault.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux-appimage:
    runs-on: ubuntu-22.04
    needs: security-and-version-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Linux AppImage
        run: pnpm --dir frontend_app tauri:build
        env:
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Publish AppImage to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Publish AppImage to "latest" release
        if: ${{ always() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: desktop/src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
